<script>
  (function() {
    function createLoadingScreen() {
      if (document.getElementById('cute-loading-screen')) return;
      var screen = document.createElement('div');
      screen.id = 'cute-loading-screen';
      var container = document.createElement('div');
      container.id = 'cute-loading-bar-container';
      var bar = document.createElement('div');
      bar.id = 'cute-loading-bar';
      var text = document.createElement('div');
      text.id = 'cute-loading-text';
      text.textContent = '✨ 小洋葱的笔记本 ✨';
      container.appendChild(bar);
      screen.appendChild(container);
      screen.appendChild(text);
      document.documentElement.appendChild(screen);
    }

    var progressTimer = null;
    var fallbackTimer = null;

    function showLoading() {
      var screen = document.getElementById('cute-loading-screen');
      if (!screen) {
        createLoadingScreen();
        screen = document.getElementById('cute-loading-screen');
      }
      var bar = document.getElementById('cute-loading-bar');
      screen.classList.remove('finish');
      bar.style.width = '0%';
      
      if (progressTimer) clearTimeout(progressTimer);
      if (fallbackTimer) clearTimeout(fallbackTimer);
      
      var width = 0;
      function fastProgress() {
        if (width < 95) {
          width += Math.floor(Math.random() * 8) + 5;
          if (width > 95) width = 95;
          bar.style.width = width + '%';
          progressTimer = setTimeout(fastProgress, 30 + Math.random() * 40);
        }
      }
      fastProgress();
      
      fallbackTimer = setTimeout(function() {
        finishLoading();
      }, 2500);
    }

    function finishLoading() {
      var screen = document.getElementById('cute-loading-screen');
      var bar = document.getElementById('cute-loading-bar');
      if (!screen || !bar) return;
      
      if (progressTimer) clearTimeout(progressTimer);
      if (fallbackTimer) clearTimeout(fallbackTimer);
      
      bar.style.width = '100%';
      setTimeout(function() {
        screen.classList.add('finish');
      }, 150);
    }

    window.showLoading = showLoading;
    window.finishLoading = finishLoading;

    createLoadingScreen();
    showLoading();

    window.addEventListener('load', function() {
      finishLoading();
    });
  })();
</script>

    function injectThemeCSS(themeVersion) {
      const oldStyle = document.getElementById(THEME_STYLE_ID);
      if (oldStyle) oldStyle.remove();
      const styleTag = document.createElement('style');
      styleTag.id = THEME_STYLE_ID;
      styleTag.textContent = themeVersion === 'v2' ? V2_THEME_CSS : V1_THEME_CSS;
      document.head.appendChild(styleTag);
      document.body.offsetHeight;
    }

    function ensureWebBg() {
      if (!document.getElementById('web_bg')) {
        const webBg = document.createElement('div');
        webBg.id = 'web_bg';
        document.body.insertBefore(webBg, document.body.firstChild);
      }
      const webBg = document.getElementById('web_bg');
      if (webBg) {
        webBg.style.display = 'none';
        webBg.offsetHeight;
        webBg.style.display = 'block';
      }
    }

    function toggleTheme() {
      const currentTheme = localStorage.getItem(STORAGE_KEY) || DEFAULT_THEME;
      const newTheme = currentTheme === 'v1' ? 'v2' : 'v1';
      localStorage.setItem(STORAGE_KEY, newTheme);
      injectThemeCSS(newTheme);
      ensureWebBg();
    }

    function insertSwitchBtn() {
      if (document.getElementById('theme-switch-btn')) return;
      const rightside = document.getElementById('rightside');
      if (!rightside) return;
      const switchBtn = document.createElement('div');
      switchBtn.id = 'theme-switch-btn';
      switchBtn.innerHTML = '<i class="fas fa-palette"></i>';
      switchBtn.title = '切换主题版本';
      switchBtn.addEventListener('click', toggleTheme);
      const settingBtn = document.getElementById('setting');
      if (settingBtn && settingBtn.parentNode === rightside) {
        rightside.insertBefore(switchBtn, settingBtn);
      } else {
        rightside.appendChild(switchBtn);
      }
    }

    (function init() {
      const currentTheme = localStorage.getItem(STORAGE_KEY) || DEFAULT_THEME;
      ensureWebBg();
      injectThemeCSS(currentTheme);
    })();

    document.addEventListener('DOMContentLoaded', () => {
      insertSwitchBtn();
      ensureWebBg();
      const darkModeBtn = document.getElementById('darkmode');
      if (darkModeBtn) {
        darkModeBtn.addEventListener('click', () => {
          setTimeout(() => {
            const currentTheme = localStorage.getItem(STORAGE_KEY) || DEFAULT_THEME;
            injectThemeCSS(currentTheme);
            ensureWebBg();
          }, 50);
        });
      }
      const rightside = document.getElementById('rightside');
      if (rightside) {
        const observer = new MutationObserver(() => {
          insertSwitchBtn();
        });
        observer.observe(rightside, { childList: true, subtree: true });
      }
    });

    document.addEventListener('pjax:complete', () => {
      const currentTheme = localStorage.getItem(STORAGE_KEY) || DEFAULT_THEME;
      ensureWebBg();
      injectThemeCSS(currentTheme);
      insertSwitchBtn();
    });

    window.addEventListener('load', () => {
      ensureWebBg();
    });
  })();
</script>
<script>
  (function() {
    function bindCardClick() {
      const cards = document.querySelectorAll('.recent-post-item');
      cards.forEach(card => {
        if (card.dataset.cardClickEnabled === 'true') return;
        card.dataset.cardClickEnabled = 'true';
        
        const titleLink = card.querySelector('.article-title');
        if (!titleLink) return;
        
        card.style.cursor = 'pointer';
        
        card.addEventListener('click', function(e) {
          const target = e.target;
          const link = target.closest('a');
          if (link) return;
          titleLink.click();
        });
      });
    }
    
    window.bindCardClick = bindCardClick;
    
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', bindCardClick);
    } else {
      bindCardClick();
    }
    
    document.addEventListener('pjax:complete', bindCardClick);
  })();
</script>

      if (document.getElementById('mobile-search-btn')) return;
      
      const searchUrl = '/onionsnotebook.github.io/search/';
      
      const searchLink = document.createElement('a');
      searchLink.id = 'mobile-search-btn';
      searchLink.href = searchUrl;
      searchLink.setAttribute('aria-label', '搜索');
      searchLink.style.cssText = `
        display: flex;
        align-items: center;
        margin-right: 12px;
        color: var(--font-color);
        font-size: 1.2rem;
        order: 1;
      `;
      
      const icon = document.createElement('i');
      icon.className = 'fas fa-search';
      searchLink.appendChild(icon);
      
      const toggleMenu = document.getElementById('toggle-menu');
      if (toggleMenu) {
        navMenus.insertBefore(searchLink, toggleMenu);
      } else {
        navMenus.appendChild(searchLink);
      }
      
      navMenus.style.display = 'flex';
      navMenus.style.alignItems = 'center';
      if (toggleMenu) toggleMenu.style.order = '2';
    }
    
    function removeMobileSearchBtn() {
      const btn = document.getElementById('mobile-search-btn');
      if (btn) btn.remove();
    }
    
    function handleResize() {
      if (window.innerWidth <= 768) {
        addMobileSearchBtn();
      } else {
        removeMobileSearchBtn();
      }
    }
    
    window.addMobileSearchBtn = addMobileSearchBtn;
    window.handleResize = handleResize;
    
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', handleResize);
    } else {
      handleResize();
    }
    
    window.addEventListener('resize', handleResize);
    document.addEventListener('pjax:complete', handleResize);
  })();
</script>
